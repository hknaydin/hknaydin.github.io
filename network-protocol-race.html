<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Protocol Race</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#050608;
  --panel-bg:rgba(8,12,20,0.95);
  --border:rgba(255,255,255,0.07);
  --text:#b8cfe0;
  --muted:#3a5570;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Rajdhani',sans-serif;
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* ── HEADER ── */
header{
  padding:14px 28px 10px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  background:rgba(5,6,8,0.98);
  z-index:100;
  position:relative;
}
.logo{
  display:flex;flex-direction:column;gap:2px;
}
.logo h1{
  font-family:'Orbitron',monospace;
  font-size:20px;font-weight:900;
  letter-spacing:4px;
  background:linear-gradient(90deg,#fff 30%,#00e5ff 70%,#bf5fff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.logo .sub{
  font-family:'Share Tech Mono',monospace;
  font-size:10px;letter-spacing:3px;color:var(--muted);
}
.header-controls{display:flex;gap:10px;align-items:center;}
button{
  font-family:'Share Tech Mono',monospace;
  font-size:11px;letter-spacing:1px;
  padding:8px 16px;border:1px solid;cursor:pointer;
  border-radius:2px;transition:all 0.2s;
}
.btn-race{
  background:rgba(255,107,53,0.15);border-color:rgba(255,107,53,0.5);color:#ff6b35;
}
.btn-race:hover{background:rgba(255,107,53,0.3);box-shadow:0 0 20px rgba(255,107,53,0.3);}
.btn-reset{
  background:rgba(0,229,255,0.08);border-color:rgba(0,229,255,0.3);color:#00e5ff;
}
.btn-reset:hover{background:rgba(0,229,255,0.15);}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:#3a5570;color:var(--text);}

.speed-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);}
input[type=range]{accent-color:#00e5ff;width:80px;}

/* ── MAIN LAYOUT ── */
.workspace{
  flex:1;display:flex;overflow:hidden;
}

/* ── CANVAS AREA ── */
.canvas-wrap{
  flex:1;position:relative;overflow:hidden;
  cursor:grab;
}
.canvas-wrap:active{cursor:grabbing;}
canvas{display:block;}

/* ── ZOOM HINT ── */
.zoom-hint{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;
  color:var(--muted);
  background:rgba(5,6,8,0.8);
  padding:6px 14px;border:1px solid var(--border);border-radius:2px;
  pointer-events:none;
  opacity:1;transition:opacity 1s;
}
.zoom-controls{
  position:absolute;bottom:16px;right:16px;
  display:flex;flex-direction:column;gap:6px;
}
.zoom-controls button{
  width:36px;height:36px;padding:0;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  background:rgba(8,12,20,0.9);border-color:var(--border);color:var(--text);
}
.zoom-controls button:hover{border-color:#3a5570;background:rgba(20,30,45,0.9);}

/* ── INFO PANEL ── */
.info-panel{
  width:0;overflow:hidden;
  border-left:1px solid var(--border);
  background:var(--panel-bg);
  transition:width 0.35s cubic-bezier(0.4,0,0.2,1);
  flex-shrink:0;
  display:flex;flex-direction:column;
}
.info-panel.open{width:320px;}

.panel-inner{
  width:320px;
  display:flex;flex-direction:column;
  height:100%;overflow-y:auto;
  padding:24px 20px;
}
.panel-inner::-webkit-scrollbar{width:3px;}
.panel-inner::-webkit-scrollbar-thumb{background:var(--border);}

.panel-close{
  align-self:flex-end;
  margin-bottom:16px;
  background:transparent;border-color:var(--border);color:var(--muted);
  padding:4px 10px;font-size:14px;
}
.proto-badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 14px;border-radius:2px;
  font-family:'Orbitron',monospace;font-size:13px;font-weight:700;
  letter-spacing:2px;margin-bottom:4px;
  border:1.5px solid;
}
.proto-fullname{
  font-family:'Share Tech Mono',monospace;font-size:11px;
  letter-spacing:1px;margin-bottom:20px;
}
.info-section{margin-bottom:18px;}
.info-section h3{
  font-family:'Orbitron',monospace;font-size:9px;
  letter-spacing:3px;color:var(--muted);
  text-transform:uppercase;margin-bottom:10px;
  padding-bottom:6px;border-bottom:1px solid var(--border);
}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat-box{
  background:rgba(255,255,255,0.03);border:1px solid var(--border);
  padding:10px;border-radius:2px;
}
.stat-label{font-size:10px;color:var(--muted);margin-bottom:4px;letter-spacing:1px;}
.stat-val{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;}

.tag-list{display:flex;flex-wrap:wrap;gap:6px;}
.tag{
  font-family:'Share Tech Mono',monospace;font-size:10px;
  padding:3px 8px;border:1px solid;border-radius:2px;
  background:rgba(255,255,255,0.03);
}

.info-text{
  font-size:13px;line-height:1.7;color:#7a9ab0;
}
.info-text strong{color:var(--text);}

.compare-bar{
  display:flex;flex-direction:column;gap:6px;margin-top:8px;
}
.bar-row{display:flex;align-items:center;gap:8px;font-size:11px;}
.bar-row .bl{width:90px;color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:10px;}
.bar-track{flex:1;height:6px;background:rgba(255,255,255,0.05);border-radius:1px;overflow:hidden;}
.bar-fill{height:100%;border-radius:1px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1);}
.bar-val{width:30px;text-align:right;font-size:10px;font-family:'Share Tech Mono',monospace;}

/* ── RACE LEADERBOARD ── */
.leaderboard{
  position:absolute;top:16px;left:16px;
  background:rgba(5,6,8,0.92);
  border:1px solid var(--border);
  padding:12px 16px;
  min-width:220px;
  z-index:50;
  display:none;
}
.leaderboard.visible{display:block;}
.lb-title{
  font-family:'Orbitron',monospace;font-size:9px;
  letter-spacing:3px;color:var(--muted);
  margin-bottom:10px;text-transform:uppercase;
}
.lb-row{
  display:flex;align-items:center;gap:8px;
  padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);
  font-size:12px;
  transition:all 0.3s;
}
.lb-rank{
  font-family:'Orbitron',monospace;font-size:11px;
  width:20px;color:var(--muted);
}
.lb-rank.gold{color:#ffd700;}
.lb-rank.silver{color:#c0c0c0;}
.lb-rank.bronze{color:#cd7f32;}
.lb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.lb-name{flex:1;font-family:'Share Tech Mono',monospace;font-size:10px;}
.lb-time{
  font-family:'Orbitron',monospace;font-size:10px;
  color:var(--muted);
}
.lb-prog{
  width:60px;height:3px;background:rgba(255,255,255,0.05);border-radius:1px;overflow:hidden;
}
.lb-prog-fill{height:100%;border-radius:1px;transition:width 0.1s linear;}
</style>
</head>
<body>

<header>
  <div class="logo">
    <h1>NETWORK PROTOCOL RACE</h1>
    <div class="sub">CLOUD INFRASTRUCTURE // ROUTING ALGORITHMS // EDU EDITION</div>
  </div>
  <div class="header-controls">
    <div class="speed-row">
      <span>HIZ</span>
      <input type="range" id="speedSlider" min="0.3" max="3" step="0.1" value="1">
      <span id="speedVal">1×</span>
    </div>
    <button class="btn-ghost" id="btnToggleAll">TÜM YOLLAR</button>
    <button class="btn-reset" id="btnReset">↺ SIFIRLA</button>
    <button class="btn-race" id="btnRace">▶ YARIŞI BAŞLAT</button>
  </div>
</header>

<div class="workspace">
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="c"></canvas>

    <div class="leaderboard" id="leaderboard">
      <div class="lb-title">📡 Yakınsama Sıralaması</div>
      <div id="lbRows"></div>
    </div>

    <div class="zoom-hint" id="zoomHint">🖱 Scroll = Zoom &nbsp;|&nbsp; Drag = Pan &nbsp;|&nbsp; Protokole Tıkla = Detay</div>
    <div class="zoom-controls">
      <button id="zoomIn" title="Yaklaştır">+</button>
      <button id="zoomReset" title="Sıfırla" style="font-size:12px">FIT</button>
      <button id="zoomOut" title="Uzaklaştır">−</button>
    </div>
  </div>

  <div class="info-panel" id="infoPanel">
    <div class="panel-inner" id="panelInner"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  PROTOCOL DEFINITIONS
// ════════════════════════════════════════════════════════
const PROTOCOLS = [
  {
    id:'OSPF', full:'Open Shortest Path First',
    color:'#f5d000', glow:'rgba(245,208,0,0.4)',
    type:'Link-State', algo:'Dijkstra (SPF)',
    layer:'Layer 3 (Network)', rfc:'RFC 2328',
    admin:110, metric:'Bandwidth Cost',
    convergence:'Hızlı (sn)', scalability:'Yüksek',
    complexity:'Yüksek', multicast:'224.0.0.5/6',
    scores:{conv:90,scale:85,cpu:60,memory:55,complexity:75},
    tags:['Link-State','LSDB','SPF','Area Tabanlı','VLSM','CIDR','IPv4/IPv6'],
    desc:`<strong>OSPF</strong>, açık standart bir link-state protokolüdür. Her router, tüm ağın haritasını (LSDB) tutarak <strong>Dijkstra algoritması</strong> ile en kısa yolu hesaplar.<br><br>
    <strong>Nasıl çalışır?</strong> Routerlar LSA (Link State Advertisement) paketleri flood eder. Tüm routerlar aynı LSDB'ye sahip olunca SPF çalışır ve routing tablosu oluşur.<br><br>
    <strong>Area kavramı:</strong> Büyük ağlarda Area 0 (backbone) etrafında hiyerarşi kurulur, LSA flooding sınırlandırılır.`,
    speed:1.4
  },
  {
    id:'BGP', full:'Border Gateway Protocol',
    color:'#00e5ff', glow:'rgba(0,229,255,0.4)',
    type:'Path-Vector', algo:'Best Path Selection',
    layer:'Layer 3 (Network)', rfc:'RFC 4271',
    admin:'20(eBGP)/200(iBGP)', metric:'AS Path + Attributes',
    convergence:'Yavaş (dk)', scalability:'Çok Yüksek',
    complexity:'Çok Yüksek', multicast:'TCP:179',
    scores:{conv:30,scale:100,cpu:50,memory:80,complexity:100},
    tags:['Path-Vector','AS','eBGP','iBGP','Internet','Policy','TCP/179'],
    desc:`<strong>BGP</strong>, internet'in temel yönlendirme protokolüdür. Otonom Sistemler (AS) arasında çalışır ve politika tabanlı en iyi yolu seçer.<br><br>
    <strong>Nasıl çalışır?</strong> Komşu routerlarla TCP bağlantısı kurulur (peer), UPDATE mesajlarıyla prefix/path bilgisi paylaşılır. AS_PATH, LOCAL_PREF, MED gibi attribute'lar en iyi yolu belirler.<br><br>
    <strong>İnterneti yönetir:</strong> ~900.000+ prefix, tüm AS'lerin routing kararları BGP ile alınır.`,
    speed:0.6
  },
  {
    id:'EIGRP', full:'Enhanced Interior Gateway Routing Protocol',
    color:'#df00ff', glow:'rgba(223,0,255,0.4)',
    type:'Hybrid (Advanced Distance-Vector)', algo:'DUAL (Diffusing Update Algorithm)',
    layer:'Layer 3 (Network)', rfc:'RFC 7868 (2016)',
    admin:90, metric:'Bandwidth + Delay',
    convergence:'Çok Hızlı', scalability:'Orta-Yüksek',
    complexity:'Orta', multicast:'224.0.0.10',
    scores:{conv:95,scale:70,cpu:75,memory:60,complexity:60},
    tags:['Hybrid','DUAL','Successor','Feasible Successor','Cisco','RTP','VLSM'],
    desc:`<strong>EIGRP</strong>, başlangıçta Cisco tescilli olan, sonradan açık standart haline gelen gelişmiş bir hibrit protokoldür.<br><br>
    <strong>DUAL Algoritması:</strong> Successor (en iyi yol) ve Feasible Successor (yedek yol) hesaplar. Topoloji değişikliğinde anında yedek yola geçer — bu yüzden çok hızlı yakınsar.<br><br>
    <strong>Partial Update:</strong> Sadece değişiklik olan bilgiyi komşulara gönderir, tam tablo değil. Bant genişliği tasarrufu sağlar.`,
    speed:1.8
  },
  {
    id:'IS-IS', full:'Intermediate System to Intermediate System',
    color:'#39ff14', glow:'rgba(57,255,20,0.4)',
    type:'Link-State', algo:'Dijkstra (SPF)',
    layer:'Layer 2 (Data Link)', rfc:'ISO 10589 / RFC 1195',
    admin:115, metric:'Default Cost (Wide)',
    convergence:'Hızlı', scalability:'Çok Yüksek',
    complexity:'Yüksek', multicast:'L1/L2 Hello',
    scores:{conv:85,scale:95,cpu:55,memory:50,complexity:70},
    tags:['Link-State','ISO','Level-1','Level-2','TLV','ISP Tercihi','IPv4/IPv6'],
    desc:`<strong>IS-IS</strong>, OSI protokol ailesinden gelen link-state protokolüdür. OSPF'e benzer şekilde Dijkstra kullanır fakat Layer 2'de çalışır — IP'den bağımsız.<br><br>
    <strong>Neden ISP'ler tercih eder?</strong> Büyük ölçekli ağlarda daha stabil yakınsama, daha az flooding overhead. Level-1 (intra-area) ve Level-2 (inter-area) hiyerarşisi vardır.<br><br>
    <strong>TLV yapısı:</strong> Genişletilebilir Type-Length-Value formatı sayesinde IPv6, MPLS, Traffic Engineering kolayca eklenir.`,
    speed:1.2
  },
  {
    id:'RIP', full:'Routing Information Protocol',
    color:'#ff6b00', glow:'rgba(255,107,0,0.4)',
    type:'Distance-Vector', algo:'Bellman-Ford',
    layer:'Layer 3 (Network)', rfc:'RFC 2453 (v2)',
    admin:120, metric:'Hop Count (max 15)',
    convergence:'Yavaş (30sn+)', scalability:'Düşük',
    complexity:'Düşük', multicast:'224.0.0.9 (RIPv2)',
    scores:{conv:20,scale:20,cpu:90,memory:90,complexity:15},
    tags:['Distance-Vector','Hop Count','Split Horizon','Poison Reverse','UDP/520','Basit'],
    desc:`<strong>RIP</strong>, en eski distance-vector protokollerinden biridir. Metrik olarak sadece <strong>hop sayısını</strong> kullanır — bant genişliğini görmez.<br><br>
    <strong>Bellman-Ford:</strong> Her 30 saniyede komşulara tam routing tablosu gönderilir. Maximum 15 hop desteklenir, 16 = sonsuz (erişilemez).<br><br>
    <strong>Sorunlar:</strong> Count-to-infinity problemi, yavaş yakınsama. Split Horizon ve Poison Reverse ile kısmen çözülür. Küçük ağlar dışında artık kullanılmaz.`,
    speed:0.5
  },
  {
    id:'MPLS', full:'Multiprotocol Label Switching',
    color:'#e8e8e8', glow:'rgba(230,230,230,0.3)',
    type:'Label Switching (L2.5)', algo:'Label Distribution Protocol',
    layer:'Layer 2.5', rfc:'RFC 3031',
    admin:'N/A', metric:'Label (32-bit)',
    convergence:'N/A (önceden hesaplanır)', scalability:'Çok Yüksek',
    complexity:'Yüksek', multicast:'LDP/RSVP',
    scores:{conv:100,scale:95,cpu:30,memory:40,complexity:80},
    tags:['Label','LSP','LDP','VPN','TE','FIB','LFIB','CoS'],
    desc:`<strong>MPLS</strong>, bir routing protokolü değil, <strong>paket iletim teknolojisidir</strong>. IP header'ına bakmak yerine 32-bit label kullanarak çok hızlı yönlendirme yapar.<br><br>
    <strong>Nasıl çalışır?</strong> Giriş routerı (Ingress LER) pakete label yazar. Core routerlar (LSR) sadece label'a bakarak paketi iletir. Çıkış routerı (Egress LER) label'ı siler.<br><br>
    <strong>Kullanım alanları:</strong> ISP VPN servisleri, Traffic Engineering, QoS, hızlı failover. Gerçek routing kararı OSPF/IS-IS gibi protokollerden gelir.`,
    speed:2.2
  },
  {
    id:'STP', full:'Spanning Tree Protocol',
    color:'#ff4d8b', glow:'rgba(255,77,139,0.4)',
    type:'Loop Prevention (L2)', algo:'Root Bridge Election (BPDU)',
    layer:'Layer 2 (Data Link)', rfc:'IEEE 802.1D',
    admin:'N/A', metric:'Path Cost (Port Speed)',
    convergence:'Çok Yavaş (30-50sn)', scalability:'Orta',
    complexity:'Düşük-Orta', multicast:'01:80:C2:00:00:00',
    scores:{conv:10,scale:45,cpu:85,memory:85,complexity:30},
    tags:['Loop Prevention','Root Bridge','BPDU','Port States','RSTP','802.1D','Switch'],
    desc:`<strong>STP</strong>, Layer 2 ağlarda döngü oluşmasını engeller. Switchler arasında mantıksal bir ağaç topolojisi oluşturur.<br><br>
    <strong>Root Bridge Seçimi:</strong> En düşük Bridge ID (Priority + MAC) olan switch Root Bridge olur. Diğer switchler Root'a giden en kısa yolu bulur, fazla portları bloklar.<br><br>
    <strong>BPDU:</strong> Bridge Protocol Data Units her 2 saniyede gönderilir. Modern ağlarda <strong>RSTP (802.1w)</strong> kullanılır — yakınsama 1-2 saniyeye düşer. MSTP ile VLAN bazlı STP instance'ları yönetilir.`,
    speed:0.35
  }
];

// ════════════════════════════════════════════════════════
//  CANVAS + VIEWPORT
// ════════════════════════════════════════════════════════
const wrap = document.getElementById('canvasWrap');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
let camX = 0, camY = 0, camScale = 1;
let isDragging = false, dragStart = {x:0,y:0}, camStart = {x:0,y:0};

// World dimensions
const LANE_H = 170;
const LANE_PAD = 30;
const WORLD_W = 1600;
const WORLD_H = PROTOCOLS.length * (LANE_H + LANE_PAD) + 80;

function resize(){
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width = W;
  canvas.height = H;
  fitWorld();
}

function fitWorld(){
  const sx = W / WORLD_W;
  const sy = H / WORLD_H;
  camScale = Math.min(sx, sy) * 0.95;
  camX = (W - WORLD_W * camScale) / 2;
  camY = (H - WORLD_H * camScale) / 2;
}

// ════════════════════════════════════════════════════════
//  NETWORK GRAPH GENERATION PER LANE
// ════════════════════════════════════════════════════════
const rng = (seed) => {
  let s = seed;
  return () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
};

function buildLane(proto, laneIndex, seed){
  const r = rng(seed);
  const y0 = 60 + laneIndex * (LANE_H + LANE_PAD) + LANE_H/2;
  const NODE_COUNT = 14 + Math.floor(r() * 6);
  const nodes = [];

  // Main path nodes (left → right)
  const pathCount = 9 + Math.floor(r() * 4);
  for(let i=0; i<pathCount; i++){
    const px = 80 + (i / (pathCount-1)) * (WORLD_W - 160);
    const py = y0 + (r()-0.5) * 40;
    nodes.push({x:px, y:py, mainPath:true, id:nodes.length});
  }

  // Extra nodes scattered around
  const extra = NODE_COUNT - pathCount;
  for(let i=0; i<extra; i++){
    nodes.push({
      x: 60 + r() * (WORLD_W - 120),
      y: y0 + (r()-0.5) * (LANE_H * 0.7),
      mainPath:false,
      id: nodes.length
    });
  }

  // Edges: main path + random cross edges
  const edges = [];
  // Main path chain
  for(let i=0;i<pathCount-1;i++){
    edges.push({a:i, b:i+1, main:true});
  }
  // Cross edges
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if(dist < 200 && r() > 0.55){
        edges.push({a:i,b:j,main:false});
      }
    }
  }

  return {nodes, edges, pathCount, y0, proto};
}

let lanes = [];

function buildAllLanes(){
  lanes = PROTOCOLS.map((p,i) => buildLane(p, i, (i+1)*777));
}

// ════════════════════════════════════════════════════════
//  PARTICLES
// ════════════════════════════════════════════════════════
let particles = [];
let showAllPaths = false;
let raceRunning = false;
let raceStart = 0;
let laneProgress = new Array(PROTOCOLS.length).fill(0);
let laneFinished = new Array(PROTOCOLS.length).fill(false);
let laneFinishTime = new Array(PROTOCOLS.length).fill(null);
let rankings = [];

function spawnParticles(){
  particles = [];
  PROTOCOLS.forEach((proto, li) => {
    const lane = lanes[li];
    // Multiple particles per lane
    const count = 3 + Math.floor(Math.random()*3);
    for(let i=0;i<count;i++){
      particles.push({
        laneIdx: li,
        pathPos: -i * 0.12, // staggered start
        speed: proto.speed,
        size: 4 + Math.random()*2,
        trail: [],
        active: true,
      });
    }
  });
}

function getPathPos(lane, t){
  const n = lane.pathCount - 1;
  const seg = Math.min(Math.floor(t * n), n-1);
  const frac = t * n - seg;
  const a = lane.nodes[seg];
  const b = lane.nodes[seg+1];
  return {
    x: a.x + (b.x-a.x)*frac,
    y: a.y + (b.y-a.y)*frac
  };
}

// ════════════════════════════════════════════════════════
//  DRAWING
// ════════════════════════════════════════════════════════
function drawScene(dt){
  ctx.clearRect(0,0,W,H);

  // Grid background (subtle)
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.025)';
  ctx.lineWidth=1;
  const gs = 40 * camScale;
  const ox = camX % gs, oy = camY % gs;
  for(let x=ox;x<W;x+=gs){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
  for(let y=oy;y<H;y+=gs){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
  ctx.restore();

  ctx.save();
  ctx.translate(camX, camY);
  ctx.scale(camScale, camScale);

  lanes.forEach((lane, li) => {
    const proto = PROTOCOLS[li];
    const col = proto.color;
    const y0 = lane.y0;

    // Lane bg
    ctx.save();
    const laneTop = y0 - LANE_H/2 + 4;
    const laneBot = y0 + LANE_H/2 - 4;

    // Faint lane separator
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4,8]);
    ctx.beginPath(); ctx.moveTo(0, laneBot+LANE_PAD/2); ctx.lineTo(WORLD_W, laneBot+LANE_PAD/2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // Protocol label
    ctx.save();
    ctx.font = `bold 11px Orbitron`;
    ctx.fillStyle = col;
    ctx.globalAlpha = 0.9;
    ctx.fillText(proto.id, 10, y0 - LANE_H/2 + 20);
    ctx.font = '9px Share Tech Mono';
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText('• ' + proto.full.toUpperCase(), 10, y0 - LANE_H/2 + 34);
    ctx.restore();

    // Progress bar (race)
    if(raceRunning || laneProgress[li] > 0){
      const prog = Math.min(laneProgress[li], 1);
      const bx = 10, by = y0 + LANE_H/2 - 14;
      const bw = WORLD_W - 20, bh = 3;
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = col;
      ctx.globalAlpha = 0.7;
      ctx.shadowColor = col; ctx.shadowBlur = 6;
      ctx.fillRect(bx, by, bw * prog, bh);
      ctx.restore();
    }

    // Draw edges
    lane.edges.forEach(e => {
      const a = lane.nodes[e.a], b = lane.nodes[e.b];
      ctx.save();
      if(e.main){
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1.5;
        ctx.globalAlpha = 0.7;
      } else {
        ctx.strokeStyle = col;
        ctx.lineWidth = showAllPaths ? 1 : 0.6;
        ctx.globalAlpha = showAllPaths ? 0.35 : 0.15;
      }
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
      ctx.restore();
    });

    // Draw nodes
    lane.nodes.forEach(n => {
      ctx.save();
      const isMain = n.mainPath;
      const r = isMain ? 5 : 3;
      if(isMain){
        ctx.shadowColor = col; ctx.shadowBlur = 8;
        ctx.fillStyle = '#ffffff';
        ctx.globalAlpha = 0.9;
      } else {
        ctx.fillStyle = col;
        ctx.globalAlpha = showAllPaths ? 0.6 : 0.25;
      }
      ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI*2); ctx.fill();
      // Border ring on main nodes
      if(isMain){
        ctx.strokeStyle = col;
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.7;
        ctx.stroke();
      }
      ctx.restore();
    });

    // Convergence time badge
    if(laneFinishTime[li] !== null){
      const t = laneFinishTime[li];
      ctx.save();
      ctx.font = '10px Orbitron';
      ctx.fillStyle = col;
      ctx.globalAlpha = 0.9;
      ctx.shadowColor = col; ctx.shadowBlur = 10;
      ctx.fillText(`✓ ${t.toFixed(1)}s`, WORLD_W - 80, y0 - LANE_H/2 + 20);
      ctx.restore();
    }
  });

  // Draw particles
  const globalSpeed = parseFloat(document.getElementById('speedSlider').value);
  particles.forEach(p => {
    if(!p.active) return;
    const li = p.laneIdx;
    const proto = PROTOCOLS[li];
    const lane = lanes[li];

    if(raceRunning){
      p.pathPos += dt * p.speed * globalSpeed * 0.0004;
    }

    const t = ((p.pathPos % 1) + 1) % 1;
    const pos = getPathPos(lane, t);

    // Trail
    p.trail.push({x:pos.x, y:pos.y});
    if(p.trail.length > 20) p.trail.shift();

    ctx.save();
    // Trail
    if(p.trail.length > 1){
      ctx.beginPath();
      p.trail.forEach((pt,i) => {
        i===0 ? ctx.moveTo(pt.x,pt.y) : ctx.lineTo(pt.x,pt.y);
      });
      ctx.strokeStyle = proto.color;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.3;
      ctx.shadowColor = proto.color;
      ctx.shadowBlur = 6;
      ctx.stroke();
    }
    // Dot
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, p.size, 0, Math.PI*2);
    ctx.fillStyle = proto.color;
    ctx.globalAlpha = 1;
    ctx.shadowColor = proto.color;
    ctx.shadowBlur = 14;
    ctx.fill();
    ctx.restore();
  });

  ctx.restore();
}

// ════════════════════════════════════════════════════════
//  RACE LOGIC
// ════════════════════════════════════════════════════════
function startRace(){
  raceRunning = true;
  raceStart = performance.now();
  laneProgress = new Array(PROTOCOLS.length).fill(0);
  laneFinished = new Array(PROTOCOLS.length).fill(false);
  laneFinishTime = new Array(PROTOCOLS.length).fill(null);
  rankings = [];
  document.getElementById('leaderboard').classList.add('visible');
  spawnParticles();
  updateLeaderboard();
}

function updateRaceProgress(now){
  if(!raceRunning) return;
  const elapsed = (now - raceStart) / 1000;
  const globalSpeed = parseFloat(document.getElementById('speedSlider').value);

  // Each protocol converges at its own speed (normalized)
  const maxTime = 20 / globalSpeed; // seconds to complete slowest

  PROTOCOLS.forEach((proto, i) => {
    if(laneFinished[i]) return;
    // Speed factor determines convergence time
    const convTime = maxTime / proto.speed;
    laneProgress[i] = Math.min(elapsed / convTime, 1);
    if(laneProgress[i] >= 1){
      laneFinished[i] = true;
      laneFinishTime[i] = elapsed;
      rankings.push(i);
      updateLeaderboard();
    }
  });

  if(rankings.length === PROTOCOLS.length){
    raceRunning = false;
    updateLeaderboard();
  }
}

function updateLeaderboard(){
  const lbRows = document.getElementById('lbRows');
  const rankSymbols = ['🥇','🥈','🥉','4','5','6','7'];
  const rankClasses = ['gold','silver','bronze','','','',''];

  // Sort by progress (descending) then by finish time
  const sorted = PROTOCOLS.map((p,i) => ({
    idx:i, proto:p,
    prog: laneProgress[i],
    finished: laneFinished[i],
    time: laneFinishTime[i]
  })).sort((a,b) => {
    if(a.finished && b.finished) return a.time - b.time;
    if(a.finished) return -1;
    if(b.finished) return 1;
    return b.prog - a.prog;
  });

  lbRows.innerHTML = sorted.map((s,rank) => `
    <div class="lb-row">
      <div class="lb-rank ${rankClasses[rank]}">${s.finished ? rankSymbols[rank] : rank+1}</div>
      <div class="lb-dot" style="background:${s.proto.color}"></div>
      <div class="lb-name">${s.proto.id}</div>
      <div class="lb-prog"><div class="lb-prog-fill" style="width:${s.prog*100}%;background:${s.proto.color}"></div></div>
      <div class="lb-time" style="color:${s.finished?s.proto.color:'#3a5570'}">${s.finished ? s.time.toFixed(1)+'s' : '–'}</div>
    </div>
  `).join('');
}

// ════════════════════════════════════════════════════════
//  INPUT: CLICK ON LANE
// ════════════════════════════════════════════════════════
canvas.addEventListener('click', e => {
  if(Math.abs(e.clientX - dragStart.x) > 5 || Math.abs(e.clientY - dragStart.y) > 5) return;
  const wx = (e.clientX - camX) / camScale;
  const wy = (e.clientY - camY) / camScale;
  for(let i=0;i<lanes.length;i++){
    const lane = lanes[i];
    if(Math.abs(wy - lane.y0) < LANE_H/2 + 10){
      openPanel(i);
      return;
    }
  }
});

// ════════════════════════════════════════════════════════
//  ZOOM & PAN
// ════════════════════════════════════════════════════════
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const mx = e.clientX, my = e.clientY;
  camX = mx - (mx - camX) * factor;
  camY = my - (my - camY) * factor;
  camScale *= factor;
  camScale = Math.max(0.2, Math.min(5, camScale));
}, {passive:false});

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  dragStart = {x:e.clientX, y:e.clientY};
  camStart = {x:camX, y:camY};
});
window.addEventListener('mousemove', e => {
  if(!isDragging) return;
  camX = camStart.x + (e.clientX - dragStart.x);
  camY = camStart.y + (e.clientY - dragStart.y);
});
window.addEventListener('mouseup', () => { isDragging = false; });

// Touch support
let lastTouchDist = 0;
canvas.addEventListener('touchstart', e => {
  if(e.touches.length === 1){
    isDragging = true;
    dragStart = {x:e.touches[0].clientX, y:e.touches[0].clientY};
    camStart = {x:camX, y:camY};
  } else if(e.touches.length === 2){
    isDragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.sqrt(dx*dx+dy*dy);
  }
},{passive:true});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if(e.touches.length === 1 && isDragging){
    camX = camStart.x + (e.touches[0].clientX - dragStart.x);
    camY = camStart.y + (e.touches[0].clientY - dragStart.y);
  } else if(e.touches.length === 2){
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const factor = dist / lastTouchDist;
    const mx = (e.touches[0].clientX+e.touches[1].clientX)/2;
    const my = (e.touches[0].clientY+e.touches[1].clientY)/2;
    camX = mx - (mx-camX)*factor;
    camY = my - (my-camY)*factor;
    camScale = Math.max(0.2,Math.min(5,camScale*factor));
    lastTouchDist = dist;
  }
},{passive:false});
canvas.addEventListener('touchend', ()=>{ isDragging = false; });

document.getElementById('zoomIn').onclick = () => {
  camX = W/2 - (W/2-camX)*1.25;
  camY = H/2 - (H/2-camY)*1.25;
  camScale = Math.min(5, camScale*1.25);
};
document.getElementById('zoomOut').onclick = () => {
  camX = W/2 - (W/2-camX)*0.8;
  camY = H/2 - (H/2-camY)*0.8;
  camScale = Math.max(0.2, camScale*0.8);
};
document.getElementById('zoomReset').onclick = fitWorld;

// ════════════════════════════════════════════════════════
//  CONTROLS
// ════════════════════════════════════════════════════════
document.getElementById('btnRace').onclick = () => {
  startRace();
  document.getElementById('btnRace').textContent = '⏸ YENIDEN BAŞLAT';
};
document.getElementById('btnReset').onclick = () => {
  raceRunning = false;
  laneProgress = new Array(PROTOCOLS.length).fill(0);
  laneFinished = new Array(PROTOCOLS.length).fill(false);
  laneFinishTime = new Array(PROTOCOLS.length).fill(null);
  rankings = [];
  particles = [];
  document.getElementById('leaderboard').classList.remove('visible');
  document.getElementById('btnRace').textContent = '▶ YARIŞI BAŞLAT';
};
document.getElementById('btnToggleAll').onclick = () => {
  showAllPaths = !showAllPaths;
  document.getElementById('btnToggleAll').textContent = showAllPaths ? 'SADECE ANA YOL' : 'TÜM YOLLAR';
};
const speedSlider = document.getElementById('speedSlider');
speedSlider.addEventListener('input', () => {
  document.getElementById('speedVal').textContent = parseFloat(speedSlider.value).toFixed(1) + '×';
});

// ════════════════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════════════════
let last = 0;
function loop(now){
  const dt = now - last; last = now;
  updateRaceProgress(now);
  if(raceRunning) updateLeaderboard();
  drawScene(dt);
  requestAnimationFrame(loop);
}

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
window.addEventListener('resize', () => { resize(); });
resize();
buildAllLanes();

// Idle particles (slow, ambient) before race
function startAmbientParticles(){
  particles = [];
  PROTOCOLS.forEach((proto, li) => {
    particles.push({
      laneIdx: li,
      pathPos: Math.random(),
      speed: proto.speed * 0.3,
      size: 3,
      trail: [],
      active: true,
    });
  });
  raceRunning = true; // just for movement
  const realRace = raceRunning;
  // Override: ambient mode
  raceRunning = false;
}

// Auto start ambient movement
setTimeout(() => {
  spawnParticles();
  raceRunning = true;
  // But keep progress at 0 until user clicks race
  laneProgress = new Array(PROTOCOLS.length).fill(0);
  raceRunning = false;
  // Just animate particles
  particles.forEach(p => { p.pathPos = Math.random(); });
  let ambientRunning = true;
  const origLoop = loop;
  function ambientLoop(now){
    const dt2 = now - last; last = now;
    if(ambientRunning){
      const gs = parseFloat(speedSlider.value);
      particles.forEach(p => {
        p.pathPos += dt2 * p.speed * gs * 0.00015;
      });
    }
    drawScene(dt2);
    requestAnimationFrame(ambientLoop);
  }
  document.getElementById('btnRace').addEventListener('click', () => {
    ambientRunning = false;
  }, {once:true});
  last = performance.now();
  requestAnimationFrame(ambientLoop);
}, 200);

// Hide zoom hint after 5s
setTimeout(() => {
  document.getElementById('zoomHint').style.opacity = '0';
}, 5000);
</script>
